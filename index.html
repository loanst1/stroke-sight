<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#145f59">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Stroke Sight">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192x192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png">
<title>Stroke Sight – Visual Field Trainer</title>
<style>
:root,[data-theme="light"]{
  --bg:#f2f5f4;--surface:#ffffff;--surface2:#eef2f1;--surface3:#e4ebe9;
  --border:rgba(0,80,70,0.13);--text:#182422;--muted:#4a6360;--faint:#9ab5b1;
  --primary:#1a7a72;--primary-h:#145f59;--primary-lt:#d4eeeb;
  --success:#2d7a3a;--success-lt:#d6eeda;
  --warn:#8a5a00;--warn-lt:#fdf0d6;
  --danger:#9b2335;--danger-lt:#fde8eb;
  --r-sm:.375rem;--r-md:.5rem;--r-lg:.75rem;--r-xl:1rem;--r-2xl:1.5rem;--r-pill:9999px;
  --sh-sm:0 1px 4px rgba(0,60,50,.08);--sh-md:0 4px 18px rgba(0,60,50,.11);--sh-lg:0 12px 40px rgba(0,60,50,.15);
  --ease:200ms cubic-bezier(.16,1,.3,1);
  --f-head:Georgia,"Times New Roman",serif;
  --f-body:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
}
[data-theme="dark"]{
  --bg:#0f1917;--surface:#182220;--surface2:#1e2b29;--surface3:#243330;
  --border:rgba(200,255,240,.1);--text:#d4e8e5;--muted:#7aa09c;--faint:#3d5552;
  --primary:#4db8af;--primary-h:#6dccc4;--primary-lt:#1a3835;
  --success:#5fba6b;--success-lt:#1a3020;
  --warn:#e8a83a;--warn-lt:#2e2010;
  --danger:#e8697a;--danger-lt:#2e1018;
  --sh-sm:0 1px 4px rgba(0,0,0,.25);--sh-md:0 4px 18px rgba(0,0,0,.35);--sh-lg:0 12px 40px rgba(0,0,0,.45);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
body{min-height:100dvh;font-family:var(--f-body);font-size:clamp(1rem,.95rem + .25vw,1.125rem);
  color:var(--text);background:var(--bg);line-height:1.6;display:flex;flex-direction:column}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}
:focus-visible{outline:2.5px solid var(--primary);outline-offset:3px;border-radius:var(--r-sm)}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}

/* ── HEADER ── */
.header{display:flex;align-items:center;justify-content:space-between;
  padding:1rem 1.5rem;background:var(--surface);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;box-shadow:var(--sh-sm)}
.logo{display:flex;align-items:center;gap:.625rem;font-family:var(--f-head);font-size:clamp(1.1rem,1rem+.5vw,1.4rem);user-select:none}
.logo-mark{width:32px;height:32px;flex-shrink:0}
.btn-icon{display:flex;align-items:center;justify-content:center;width:42px;height:42px;
  border-radius:var(--r-lg);border:1px solid var(--border);background:var(--surface2);color:var(--muted);
  transition:background var(--ease),color var(--ease)}
.btn-icon:hover{background:var(--surface3);color:var(--text)}

/* ── NAV ── */
.bottom-nav{display:flex;border-top:1px solid var(--border);background:var(--surface);
  position:sticky;bottom:0;z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;min-height:58px;font-size:.75rem;color:var(--muted);border-radius:0;
  transition:color var(--ease)}
.nav-btn svg{width:22px;height:22px;stroke-width:1.8;transition:stroke-width var(--ease)}
.nav-btn.active,.nav-btn:hover{color:var(--primary)}
.nav-btn.active svg{stroke-width:2.4}

/* ── SCREENS ── */
.main{flex:1;display:flex;flex-direction:column}
.screen{display:none;flex-direction:column;flex:1}
.screen.active{display:flex}

/* ── HOME ── */
.home-body{padding:2rem 1.5rem;max-width:900px;margin:0 auto;width:100%}
.home-body h1{font-family:var(--f-head);font-size:clamp(1.8rem,1.2rem+2vw,2.6rem);line-height:1.2;margin-bottom:.75rem}
.home-body>p{color:var(--muted);max-width:54ch;margin-bottom:2rem}
.notice{display:flex;gap:.75rem;background:var(--warn-lt);border:1px solid rgba(138,90,0,.22);
  border-radius:var(--r-lg);padding:1rem;margin-bottom:2rem;font-size:.9rem;color:var(--muted)}
.notice svg{flex-shrink:0;margin-top:2px;color:var(--warn)}
.notice strong{color:var(--warn)}
.sec-label{font-size:.8rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
  color:var(--muted);margin-bottom:1rem}
.ex-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(270px,100%),1fr));gap:1rem;margin-bottom:3rem}
.ex-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-2xl);
  padding:1.5rem;text-align:left;box-shadow:var(--sh-sm);
  transition:transform var(--ease),box-shadow var(--ease),border-color var(--ease)}
.ex-card:hover{transform:translateY(-3px);box-shadow:var(--sh-md);border-color:rgba(26,122,114,.35)}
.ex-card:active{transform:translateY(0)}
.ex-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.75rem}
.ex-ico{width:44px;height:44px;display:flex;align-items:center;justify-content:center;
  border-radius:var(--r-lg);background:var(--surface2);color:var(--primary);flex-shrink:0}
.ex-ico svg{width:22px;height:22px}
.badge{font-size:.7rem;font-weight:700;padding:3px .625rem;border-radius:var(--r-pill);
  letter-spacing:.04em;text-transform:uppercase}
.b-teal{background:var(--primary-lt);color:var(--primary)}
.b-green{background:var(--success-lt);color:var(--success)}
.b-amber{background:var(--warn-lt);color:var(--warn)}
.ex-card h3{font-family:var(--f-head);font-size:clamp(1.1rem,1rem+.4vw,1.3rem);margin-bottom:.5rem;line-height:1.3}
.ex-card p{font-size:.9rem;color:var(--muted);line-height:1.5}

/* ── EXERCISE SCREEN ── */
.ex-header{display:flex;align-items:center;gap:1rem;padding:.875rem 1.25rem;
  border-bottom:1px solid var(--border);background:var(--surface)}
.btn-back{display:flex;align-items:center;gap:.375rem;font-size:.875rem;font-weight:600;
  color:var(--muted);padding:.5rem .875rem;border-radius:var(--r-lg);
  border:1px solid var(--border);background:var(--surface2);
  transition:background var(--ease),color var(--ease)}
.btn-back:hover{background:var(--surface3);color:var(--text)}
.ex-title{font-family:var(--f-head);font-size:clamp(1.1rem,1rem+.5vw,1.4rem)}
.ex-body{display:flex;flex-direction:column;align-items:center;padding:1.5rem;gap:1.25rem;flex:1}
.instr{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);
  padding:1rem 1.25rem;max-width:720px;width:100%;font-size:.9rem;color:var(--muted);line-height:1.55}
.instr strong{color:var(--text)}
.stats-row{display:flex;gap:2rem;flex-wrap:wrap;justify-content:center}
.s-box{text-align:center}
.s-num{font-family:var(--f-head);font-size:clamp(1.4rem,1.1rem+1vw,1.9rem);font-weight:700;color:var(--primary)}
.s-lbl{font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
.feedback{font-family:var(--f-head);font-size:1.1rem;font-weight:600;min-height:1.8em;
  display:flex;align-items:center;justify-content:center}
.fb-good{color:var(--success)}.fb-bad{color:var(--danger)}
.canvas-wrap{background:#081210;border-radius:var(--r-2xl);overflow:hidden;width:100%;
  max-width:720px;box-shadow:var(--sh-lg);border:1px solid var(--border)}
canvas{display:block;width:100%;height:auto;touch-action:none}
.controls{display:flex;gap:.75rem;flex-wrap:wrap;justify-content:center}
.btn-start{background:var(--primary);color:#fff;padding:.75rem 2.5rem;
  border-radius:var(--r-pill);font-weight:700;font-size:.95rem;
  box-shadow:var(--sh-sm);transition:background var(--ease),transform var(--ease)}
.btn-start:hover{background:var(--primary-h)}
.btn-start:active{transform:scale(.97)}
.btn-start:disabled{opacity:.45;cursor:not-allowed}

/* ── PROGRESS ── */
.prog-body{padding:2rem 1.5rem;max-width:860px;margin:0 auto;width:100%}
.prog-body h2{font-family:var(--f-head);font-size:clamp(1.5rem,1.1rem+1.2vw,2rem);margin-bottom:1.5rem}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(140px,100%),1fr));gap:.875rem;margin-bottom:2rem}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);padding:1.25rem;text-align:center}
.kpi-num{font-family:var(--f-head);font-size:clamp(1.5rem,1.2rem+1vw,2rem);color:var(--primary);font-weight:700}
.kpi-lbl{font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-top:.25rem}
.hist-list{display:flex;flex-direction:column;gap:.625rem}
.hist-item{display:flex;align-items:center;justify-content:space-between;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);
  padding:.875rem 1.25rem;font-size:.9rem}
.hist-name{font-weight:600}.hist-meta{color:var(--muted);font-size:.8rem}
.hist-score{color:var(--primary);font-weight:700;font-size:1rem}
.empty-hist{text-align:center;color:var(--muted);padding:3rem 1rem;font-size:.95rem}
.prog-sec{font-size:.8rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
  color:var(--muted);margin:1.5rem 0 .875rem}

/* ── ABOUT ── */
.about-body{padding:2rem 1.5rem;max-width:680px;margin:0 auto;width:100%}
.about-body h2{font-family:var(--f-head);font-size:clamp(1.5rem,1.1rem+1.2vw,2rem);margin-bottom:1.5rem}
.about-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);
  padding:1.5rem;margin-bottom:1rem}
.about-card h3{font-family:var(--f-head);font-size:1.1rem;margin-bottom:.625rem;color:var(--primary)}
.about-card p,.about-card li{font-size:.95rem;color:var(--muted);line-height:1.6;margin-bottom:.5rem}
.about-card ul{padding-left:1.25rem}

/* ── BENCHMARK CARDS (new) ── */
.bench-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);
  padding:1.5rem;margin-bottom:1rem}
.bench-card h3{font-family:var(--f-head);font-size:1.1rem;margin-bottom:.875rem;color:var(--primary);
  display:flex;align-items:center;gap:.5rem}
.bench-card h3 .bench-sessions{font-family:var(--f-body);font-size:.75rem;font-weight:600;
  color:var(--muted);background:var(--surf
