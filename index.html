<body>
  <p>Redirecting to <a href="https://ansteyapps.com/stroke-sight/">ansteyapps.com</a>…</p>
  <script>
    // Aggressively clear all service workers and caches, then redirect
    async function clearAndRedirect() {
      try {
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(r => r.unregister()));
        }
        if ('caches' in window) {
          const names = await caches.keys();
          await Promise.all(names.map(n => caches.delete(n)));
        }
      } catch(e) {}
      window.location.replace("https://ansteyapps.com/stroke-sight/");
    }
    clearAndRedirect();
  </script>
